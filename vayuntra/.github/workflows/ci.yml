name: Vayuntra CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint (flake8)
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t vayuntra-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t vayuntra-frontend:ci ./frontend

  security-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image for scan
        run: docker build -t vayuntra-backend:scan ./backend

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vayuntra-backend:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
